name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          modules: 'qtmultimedia'
      
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      
      - name: Package
        run: |
          mkdir -p release
          cp build/mimo_tts release/
          cd release && tar -czf ../mimo_tts-macos.tar.gz *
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mimo_tts-macos
          path: mimo_tts-macos.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          modules: 'qtmultimedia'
      
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      
      - name: Package
        run: Compress-Archive -Path build/Release/mimo_tts.exe -DestinationPath mimo_tts-windows.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mimo_tts-windows
          path: mimo_tts-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglib2.0-dev
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          modules: 'qtmultimedia'
      
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      
      - name: Package
        run: |
          mkdir -p release
          cp build/mimo_tts release/
          cd release && tar -czf ../mimo_tts-linux.tar.gz *
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mimo_tts-linux
          path: mimo_tts-linux.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate tag
        id: tag
        run: |
          TAG="v$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          files: |
            artifacts/mimo_tts-macos/mimo_tts-macos.tar.gz
            artifacts/mimo_tts-windows/mimo_tts-windows.zip
            artifacts/mimo_tts-linux/mimo_tts-linux.tar.gz
          generate_release_notes: true
