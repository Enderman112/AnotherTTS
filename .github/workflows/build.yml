name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          modules: 'qtmultimedia'
      
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      
      - name: Deploy Qt
        run: |
          ${{ env.Qt6_DIR }}/bin/macdeployqt build/tts.app
      
      - name: Package
        run: |
          cd build && tar -czf ../tts-macos.tar.gz tts.app
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-macos
          path: tts-macos.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          modules: 'qtmultimedia'
      
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      
      - name: Deploy Qt
        run: |
          windeployqt build\Release\tts.exe
      
      - name: Package
        run: Compress-Archive -Path build\Release\* -DestinationPath tts-windows.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-windows
          path: tts-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglib2.0-dev
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          modules: 'qtmultimedia'
      
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      
      - name: Package
        run: |
          mkdir -p release
          cp build/tts release/
          cd release && tar -czf ../tts-linux.tar.gz *
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-linux
          path: tts-linux.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate tag
        id: tag
        run: |
          TAG="v$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          files: |
            artifacts/tts-macos/tts-macos.tar.gz
            artifacts/tts-windows/tts-windows.zip
            artifacts/tts-linux/tts-linux.tar.gz
          generate_release_notes: true
